name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  smoke-tests:
    name: Smoke tests (Python ${{ matrix.python }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python: ["3.11"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: "pip"

      - name: Install CPU PyTorch (CI has no GPU)
        run: |
          python -m pip install --upgrade pip
          pip install --index-url https://download.pytorch.org/whl/cpu "torch>=2.2,<2.5"

      - name: Install project (no Darts in CI; not needed for Phase 0-2 smokes)
        run: |
          pip install -e ".[]" \
            "numpy>=1.26,<2.2" "scipy>=1.11" "pandas>=2.1" \
            "polars>=1.0" "pyarrow>=15.0" "scikit-learn>=1.4" \
            "pyod>=1.1.3" "stumpy>=1.13" "tslearn>=0.6.3" \
            "hdbscan>=0.8.33" "statsmodels>=0.14" \
            "POT>=0.9" "choix>=0.3.5" "prts>=1.0.0.3" \
            "joblib>=1.3" "tqdm>=4.66" "requests>=2.31" \
            "pyyaml>=6.0" "click>=8.1" "numba>=0.59" \
            "pytest>=8.0" "pytest-cov>=4.1" "ruff>=0.4"

      - name: Lint with ruff
        run: ruff check src tests scripts || echo "ruff lints (non-blocking initially)"

      - name: Run Phase 0 + Phase 1 smoke tests (no external data needed)
        run: |
          pytest tests/smoke/test_phase_0_smoke.py tests/smoke/test_phase_1_smoke.py -v
        timeout-minutes: 5

  paper-pages:
    name: Paper builds (lint HTML)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify index.html is valid (size + open/close tags balanced)
        run: |
          test -f index.html
          size=$(stat -c%s index.html)
          echo "index.html size: $size bytes"
          test "$size" -gt 50000 || (echo "index.html unexpectedly small"; exit 1)
          # Loose tag balance sanity (not a full HTML validator, just a smoke)
          opens=$(grep -o '<h2' index.html | wc -l)
          closes=$(grep -o '</h2>' index.html | wc -l)
          test "$opens" = "$closes" || (echo "h2 tag imbalance: opens=$opens closes=$closes"; exit 1)
          echo "Paper HTML smoke: OK"
